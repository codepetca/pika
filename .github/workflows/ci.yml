name: CI

on:
  pull_request:
    branches: [main, production]
  push:
    branches: [main, production]

jobs:
  architecture-database-contracts:
    name: Architecture Database Contracts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.103.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.25.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start ephemeral Supabase and replay migrations
        run: supabase start -x analytics,edge-runtime,functions,imgproxy,inbucket,meta,realtime,studio,vector

      - name: Check generated database types
        run: pnpm run db:types:check

      - name: Verify atomic assignment feedback returns
        run: bash scripts/check-atomic-assignment-feedback-returns.sh

      - name: Verify atomic assignment draft and submission integrity
        run: bash scripts/check-atomic-assignment-submissions.sh

      - name: Verify assignment submission concurrency
        run: bash scripts/check-assignment-submission-concurrency.sh

      - name: Verify atomic student test submission
        run: bash scripts/check-atomic-test-submit.sh

      - name: Verify atomic test grading
        run: bash scripts/check-atomic-test-grading.sh

      - name: Verify atomic blueprint rollback and replay
        run: bash scripts/check-atomic-blueprint-operations.sh

      - name: Verify archive operations and lifecycle evidence
        run: bash scripts/check-classroom-archive-database.sh

      - name: Verify atomic archive compaction rollback and cleanup staging
        run: bash scripts/check-classroom-archive-compaction-database.sh

      - name: Verify archive compatibility, then rehearse legacy Quiz freeze and backfill
        run: bash scripts/check-legacy-quiz-freeze-backfill.sh

      - name: Verify Gradex extract operations and retention cleanup
        run: bash scripts/check-classroom-gradex-database.sh

      - name: Audit classroom ownership graph and primary keys
        run: pnpm exec tsx scripts/check-classroom-resource-schema.ts
        env:
          CLASSROOM_SCHEMA_AUDIT_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
          CLASSROOM_SCHEMA_AUDIT_LOCAL: "true"

      - name: Rehearse full classroom archive recovery on local Supabase
        run: pnpm verify:classroom-archive-recovery

      - name: Stop ephemeral database
        if: always()
        run: supabase stop --no-backup

  test-and-build:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.25.0

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v6
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check architecture boundaries
        run: pnpm run check:architecture

      - name: Run tests with coverage
        run: pnpm run test:coverage

      - name: Check TypeScript
        run: npx tsc --noEmit

      - name: Run linter
        run: pnpm run lint

      - name: Build production bundle
        run: pnpm run build
        env:
          # Required environment variables for build
          # These are dummy values for CI - real values are in Vercel
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: placeholder-publishable-key
          SUPABASE_SECRET_KEY: placeholder-secret-key
          SESSION_SECRET: placeholder-session-secret-at-least-32-chars-long

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  browser-experience-matrix:
    name: Browser Experience Matrix
    runs-on: ubuntu-latest
    env:
      E2E_BASE_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      SESSION_SECRET: ci-browser-session-secret-with-at-least-32-characters
      ENABLE_MOCK_EMAIL: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.103.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.25.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start ephemeral Supabase and replay migrations
        run: supabase start -x analytics,edge-runtime,functions,imgproxy,inbucket,meta,realtime,studio,vector

      - name: Export local Supabase environment
        shell: bash
        run: |
          eval "$(supabase status -o env \
            --override-name api.url=NEXT_PUBLIC_SUPABASE_URL \
            --override-name auth.anon_key=NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY \
            --override-name auth.service_role_key=SUPABASE_SECRET_KEY)"
          echo "NEXT_PUBLIC_SUPABASE_URL=$NEXT_PUBLIC_SUPABASE_URL" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=$NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY" >> "$GITHUB_ENV"
          echo "SUPABASE_SECRET_KEY=$SUPABASE_SECRET_KEY" >> "$GITHUB_ENV"

      - name: Seed browser fixtures
        run: pnpm seed

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run teacher and student browser matrix
        run: pnpm e2e:matrix

      - name: Upload browser diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: browser-experience-matrix
          path: |
            playwright-report/
            test-results/
          retention-days: 7

      - name: Stop ephemeral database
        if: always()
        run: supabase stop --no-backup
